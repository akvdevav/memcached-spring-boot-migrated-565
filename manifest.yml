---
applications:
- name: memcached-spring-boot-modernized-memcached-spring-boot-autoconfigure
  memory: 1G
  instances: 1
  buildpacks:
    - java_buildpack
  path: memcached-spring-boot-autoconfigure/build/libs/*.jar
  env:
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    SPRING_PROFILES_ACTIVE: cloud
  services:
    - modernized-postgres
    - modernized-valkey

